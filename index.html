<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Access Tracker — Nye Metoder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F6F8;color:#111827;font-size:14px}
button,input,select,textarea{font-family:inherit}
table{border-collapse:collapse;width:100%}
th{text-align:left}
.nav-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:2px;color:#8B9AB5;font-weight:400}
.nav-item:hover{background:rgba(255,255,255,0.07);color:#fff}
.nav-item.active{background:rgba(255,255,255,0.13);color:#fff;font-weight:600}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px 20px;margin-bottom:14px}
.btn{padding:7px 15px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;border:none;line-height:1.4}
.btn-primary{background:#111827;color:#fff}
.btn-primary:hover{background:#1f2937}
.btn-secondary{background:#fff;color:#111827;border:1px solid #D1D5DB}
.btn-secondary:hover{background:#F9FAFB}
.btn-danger{background:#FEF2F2;color:#991B1B;border:1px solid #FCA5A5}
.btn-sm{padding:5px 11px;font-size:12px}
.inp{width:100%;padding:7px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:13px;background:#fff;color:#111827}
.inp:focus{outline:none;border-color:#6B7280}
.label{display:block;font-size:11px;font-weight:600;color:#6B7280;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field{margin-bottom:13px}
.hint{font-size:11px;color:#9CA3AF;margin-top:3px}
.chip{padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #D1D5DB;background:transparent;color:#6B7280;display:inline-block;margin:3px}
.chip.on{background:#111827;color:#fff;border-color:#111827}
.metric{flex:1 1 0;min-width:120px;background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:13px 16px}
.metric-label{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.metric-value{font-size:26px;font-weight:500;line-height:1}
.metric-sub{font-size:11px;color:#9CA3AF;margin-top:3px}
.metrics-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.col{flex:1;min-width:110px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title{font-size:13px;font-weight:500}
.form-block{margin-bottom:22px}
.form-block-title{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid #F3F4F6}
.table-head th{padding:8px 10px;font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.04em;background:#F9FAFB;border-bottom:1px solid #E5E7EB}
.table-row td{padding:8px 10px;border-bottom:1px solid #F9FAFB;font-size:13px}
.table-row:hover td{background:#F9FAFB;cursor:pointer}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.fsel{padding:7px 9px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;background:#fff;color:#111827}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.detail-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:12px}
.detail-label{color:#9CA3AF}
.meth-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;font-size:12px}
.meth-item-label{color:#9CA3AF;margin-bottom:2px}
.chart-wrap{position:relative}
.empty{text-align:center;color:#9CA3AF;padding:28px 0;font-size:13px}
.back-btn{margin-bottom:14px}
.danger-confirm{display:flex;align-items:center;gap:8px;font-size:12px;color:#991B1B}
.priority-badge{font-size:11px;padding:3px 8px;background:#FFFBEB;color:#92400E;border:1px solid #FCD34D;border-radius:20px}
.data-full{color:#065F46;font-weight:600;font-size:11px}
.data-partial{color:#D1D5DB;font-size:11px}
.drug-group{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px 20px;margin-bottom:11px}
.drug-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.drug-name{font-weight:600;font-size:15px}
.drug-meta{color:#9CA3AF;font-size:11px;font-family:monospace}
.tax-sidebar div{padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:2px;color:#6B7280}
.tax-sidebar div:hover{background:#F3F4F6;color:#111827}
.tax-sidebar div.active{background:#F3F4F6;color:#111827;font-weight:500}
.tax-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #F9FAFB;font-size:13px}
.tax-remove{background:none;border:none;cursor:pointer;color:#D1D5DB;font-size:18px;line-height:1;padding:0 3px}
.tax-remove:hover{color:#9CA3AF}
.no-meth{border:1px dashed #E5E7EB;border-radius:10px;padding:13px 18px;margin-bottom:12px;text-align:center;font-size:13px;color:#9CA3AF}
</style>
</head>
<body>
<div id="app" style="display:flex;min-height:100vh">
  <div id="sidebar" style="width:204px;background:#1A2235;padding:18px 10px;display:flex;flex-direction:column;flex-shrink:0;min-height:100vh"></div>
  <div style="flex:1;overflow-y:auto">
    <div id="main" style="padding:20px 24px;max-width:1060px"></div>
  </div>
</div>
<script>
// ── CONSTANTS ─────────────────────────────────────────────
const TAX0 = {
  cancerTypes:['Lung — NSCLC','Lung — SCLC','Breast','Colorectal','Melanoma','Hematological','Prostate','Ovarian / gynecological','Gastric / GI','Renal / kidney','Bladder / urothelial','Head and neck','Pancreatic','Hepatocellular','CNS / brain','Thyroid','Sarcoma','Other'],
  modalities:['Immunotherapy — CPI','Targeted — small molecule','Targeted — mAb','ADC','Chemotherapy','Hormone therapy','CAR-T / cell therapy','Radioligand therapy','Bispecific antibody','Combination','Other'],
  processTypes:['STA — new indication','STA — indication expansion','Full HTA (metodevurdering)','Re-submission / re-evaluation','Price revision','Method reassessment'],
  outcomes:['Approved — full','Approved — conditional / MEA','New price negotiation initiated','Not approved','Deferred — awaiting data','Company withdrawal','Re-evaluation ongoing'],
  reasons:['Cost-effectiveness threshold exceeded','Clinical uncertainty — survival','Immature / short follow-up data','Surrogate endpoint not accepted','Comparator dispute','Population definition issues','Severity assessment disputed','Price not agreed','Not applicable — approved'],
  uDrivers:['Survival extrapolation','Immature data','Small trial / single-arm','Surrogate endpoint used','Heterogeneous population','Comparator selection','Real-world generalizability','Long-term safety unknown'],
  endpoints:['OS','PFS','EFS / DFS','ORR / CR','QoL','Other'],
  magnussen:['Step 1 — Low (APT < 0.10)','Step 2 — Moderate (APT 0.10–0.20)','Step 3 — High (APT 0.20–0.40)','Step 4 — Very high (APT > 0.40)'],
  lines:['1st line','2nd line','3rd line+','Adjuvant','Neoadjuvant','Maintenance','Any line'],
};

const MS = [
  {k:'emaApproval',l:'EMA approval'},{k:'nmSub',l:'NM submission'},{k:'htaInit',l:'HTA initiated'},
  {k:'assessment',l:'Assessment'},{k:'bfMeeting',l:'BF meeting'},{k:'decision',l:'Decision'},{k:'impl',l:'Implementation'},
];

const OC = {
  'Approved — full':              {bg:'#ECFDF5',tx:'#065F46',bd:'#6EE7B7'},
  'Approved — conditional / MEA':{bg:'#F0FDF4',tx:'#14532D',bd:'#86EFAC'},
  'New price negotiation initiated':{bg:'#F5F3FF',tx:'#4C1D95',bd:'#C4B5FD'},
  'Not approved':                 {bg:'#FEF2F2',tx:'#991B1B',bd:'#FCA5A5'},
  'Deferred — awaiting data':     {bg:'#EFF6FF',tx:'#1E40AF',bd:'#BFDBFE'},
  'Company withdrawal':           {bg:'#F9FAFB',tx:'#374151',bd:'#D1D5DB'},
  'Re-evaluation ongoing':        {bg:'#FFFBEB',tx:'#92400E',bd:'#FCD34D'},
};

const SEED = [
  {id:'s1',inn:'pembrolizumab',brand:'Keytruda',company:'MSD',cancer:'Lung — NSCLC',line:'1st line',biomarker:'PD-L1 ≥50%, EGFR-/ALK-',mod:'Immunotherapy — CPI',caseId:'ID2021-088',proc:'STA — new indication',priority:'High',ms:{emaApproval:'2019-01-08',nmSub:'2021-03-15',htaInit:'2021-04-01',assessment:'2021-10-20',bfMeeting:'2022-01-24',decision:'2022-01-24',impl:'2022-03-01'},outcome:'Approved — full',reasons:['Not applicable — approved'],rationale:'Strong OS from KEYNOTE-024. Met cost-effectiveness threshold at step 4.',meth:{on:true,model:'Partitioned survival model',ep:['OS','PFS'],surrogate:'No',uLevel:'Moderate',uDrivers:['Survival extrapolation','Comparator selection'],apt:'0.52',mag:'Step 4 — Very high (APT > 0.40)',qaly:'1.24',cpq:'420000',priceNeg:true},notes:'First IO approval in NSCLC 1L.',updated:'2024-01-01'},
  {id:'s2',inn:'trastuzumab deruxtecan',brand:'Enhertu',company:'AstraZeneca / Daiichi Sankyo',cancer:'Breast',line:'2nd line',biomarker:'HER2+',mod:'ADC',caseId:'ID2022-041',proc:'STA — new indication',priority:'High',ms:{emaApproval:'2021-01-22',nmSub:'2022-02-10',htaInit:'2022-03-01',assessment:'2022-09-15',bfMeeting:'2022-11-28',decision:'2022-11-28',impl:''},outcome:'New price negotiation initiated',reasons:['Cost-effectiveness threshold exceeded'],rationale:'Cost/QALY above threshold. Referred to Sykehusinnkjøp.',meth:{on:true,model:'Partitioned survival model',ep:['OS','PFS'],surrogate:'Partial',uLevel:'High',uDrivers:['Immature data','Surrogate endpoint used','Survival extrapolation'],apt:'0.48',mag:'Step 4 — Very high (APT > 0.40)',qaly:'0.89',cpq:'780000',priceNeg:true},notes:'ADC class precedent for breast cancer.',updated:'2024-01-01'},
  {id:'s3',inn:'osimertinib',brand:'Tagrisso',company:'AstraZeneca',cancer:'Lung — NSCLC',line:'Adjuvant',biomarker:'EGFR (ex19del, L858R)',mod:'Targeted — small molecule',caseId:'ID2021-112',proc:'STA — indication expansion',priority:'High',ms:{emaApproval:'2021-04-13',nmSub:'2021-07-05',htaInit:'2021-08-01',assessment:'2022-03-10',bfMeeting:'2022-05-23',decision:'2022-05-23',impl:'2022-07-01'},outcome:'Approved — conditional / MEA',reasons:['Immature / short follow-up data','Surrogate endpoint not accepted'],rationale:'OS data immature at decision. Approved conditional on outcomes registry.',meth:{on:true,model:'Partitioned survival model',ep:['EFS / DFS','OS'],surrogate:'Partial',uLevel:'High',uDrivers:['Survival extrapolation','Immature data','Surrogate endpoint used'],apt:'0.38',mag:'Step 3 — High (APT 0.20–0.40)',qaly:'1.05',cpq:'510000',priceNeg:true},notes:'',updated:'2024-01-01'},
  {id:'s4',inn:'olaparib',brand:'Lynparza',company:'AstraZeneca',cancer:'Breast',line:'Adjuvant',biomarker:'BRCA1/2 germline, HER2-',mod:'Targeted — small molecule',caseId:'ID2022-078',proc:'STA — indication expansion',priority:'High',ms:{emaApproval:'2022-04-04',nmSub:'2022-06-20',htaInit:'2022-07-15',assessment:'2023-01-18',bfMeeting:'2023-03-27',decision:'2023-03-27',impl:''},outcome:'Not approved',reasons:['Cost-effectiveness threshold exceeded','Immature / short follow-up data'],rationale:'Cost/QALY well above threshold at step 4. OS data not mature.',meth:{on:true,model:'Partitioned survival model',ep:['EFS / DFS','OS'],surrogate:'No',uLevel:'Very high',uDrivers:['Immature data','Survival extrapolation','Small trial / single-arm'],apt:'0.41',mag:'Step 4 — Very high (APT > 0.40)',qaly:'0.62',cpq:'1200000',priceNeg:false},notes:'Re-submission expected once OS matures.',updated:'2024-01-01'},
  {id:'s5',inn:'nivolumab',brand:'Opdivo',company:'Bristol-Myers Squibb',cancer:'Colorectal',line:'2nd line',biomarker:'MSI-H / dMMR',mod:'Immunotherapy — CPI',caseId:'ID2022-091',proc:'STA — new indication',priority:'Standard',ms:{emaApproval:'2022-07-04',nmSub:'2022-10-12',htaInit:'2022-11-01',assessment:'2023-06-14',bfMeeting:'2023-09-25',decision:'2023-09-25',impl:'2023-11-01'},outcome:'Approved — full',reasons:['Not applicable — approved'],rationale:'Strong OS in MSI-H population. Cost-effectiveness within threshold.',meth:{on:true,model:'Partitioned survival model',ep:['OS','PFS'],surrogate:'No',uLevel:'Moderate',uDrivers:['Small trial / single-arm','Heterogeneous population'],apt:'0.44',mag:'Step 4 — Very high (APT > 0.40)',qaly:'1.51',cpq:'380000',priceNeg:true},notes:'',updated:'2024-01-01'},
  {id:'s6',inn:'lenvatinib + pembrolizumab',brand:'Lenvima + Keytruda',company:'Eisai / MSD',cancer:'Renal / kidney',line:'1st line',biomarker:'',mod:'Combination',caseId:'ID2022-055',proc:'STA — new indication',priority:'Standard',ms:{emaApproval:'2022-01-28',nmSub:'2022-05-10',htaInit:'2022-06-01',assessment:'2023-02-22',bfMeeting:'2023-05-29',decision:'2023-05-29',impl:''},outcome:'Deferred — awaiting data',reasons:['Immature / short follow-up data','Comparator dispute'],rationale:'Comparator disputed. Awaiting OS update from CLEAR trial.',meth:{on:true,model:'Partitioned survival model',ep:['PFS','OS'],surrogate:'No',uLevel:'High',uDrivers:['Immature data','Comparator selection','Survival extrapolation'],apt:'0.45',mag:'Step 4 — Very high (APT > 0.40)',qaly:'0.77',cpq:'890000',priceNeg:false},notes:'',updated:'2024-01-01'},
];

// ── STATE ─────────────────────────────────────────────────
let S = {
  view:'dashboard', cases:[], tax:JSON.parse(JSON.stringify(TAX0)),
  selId:null, editing:null, prevView:'cases',
  fQ:'', fCancer:'', fOutcome:'', fMod:'', fSort:'updated',
  taxList:'cancerTypes', delConfirm:false,
};
let _chips = {}; // form chip selections

// ── STORAGE ───────────────────────────────────────────────
function persist() {
  localStorage.setItem('nmt_cases_v2', JSON.stringify(S.cases));
  localStorage.setItem('nmt_tax_v2', JSON.stringify(S.tax));
}
function restore() {
  try { const c=localStorage.getItem('nmt_cases_v2'); S.cases=c?JSON.parse(c):JSON.parse(JSON.stringify(SEED)); } catch(e){ S.cases=JSON.parse(JSON.stringify(SEED)); }
  try { const t=localStorage.getItem('nmt_tax_v2'); if(t) S.tax=JSON.parse(t); } catch(e){}
}

// ── HELPERS ───────────────────────────────────────────────
const genId = () => 'c-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
const fmtD  = d => { if(!d) return '—'; try{return new Date(d).toLocaleDateString('no-NO',{day:'2-digit',month:'short',year:'numeric'});}catch{return '—';} };
const dBetw = (d1,d2) => { if(!d1||!d2) return null; const n=new Date(d2)-new Date(d1); return isNaN(n)?null:Math.round(n/86400000); };
const mBetw = (d1,d2) => { const d=dBetw(d1,d2); return d===null?null:Math.round(d/30.44*10)/10; };
const isApp = o => o==='Approved — full'||o==='Approved — conditional / MEA';
const isRej = o => o==='Not approved';
const e     = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const today = () => new Date().toISOString().slice(0,10);

function badge(outcome, sm=false) {
  const c=OC[outcome]||{bg:'#F9FAFB',tx:'#374151',bd:'#D1D5DB'};
  return `<span style="display:inline-block;background:${c.bg};color:${c.tx};border:1px solid ${c.bd};border-radius:20px;padding:${sm?'2px 8px':'4px 12px'};font-size:${sm?11:12}px;font-weight:500;white-space:nowrap">${e(outcome)||'—'}</span>`;
}

// ── CHARTS ────────────────────────────────────────────────
const CHS = {};
function mkChart(id, type, data, opts={}) {
  setTimeout(()=>{
    const el=document.getElementById(id); if(!el) return;
    if(CHS[id]) CHS[id].destroy();
    CHS[id]=new Chart(el,{type,data,options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},...opts}});
  },50);
}

// ── NAVIGATE ──────────────────────────────────────────────
function go(view, id) {
  if(['dashboard','cases','drugs','analytics','settings'].includes(view)) S.prevView=view;
  S.view=view; S.delConfirm=false;
  if(id!==undefined) S.selId=id;
  render();
}

// ── TIMELINE ──────────────────────────────────────────────
function buildTimeline(ms) {
  return `<div style="overflow-x:auto;padding-bottom:4px"><div style="display:flex;align-items:flex-start;min-width:600px">`+
    MS.map((m,i)=>{
      const date=ms?.[m.k], next=MS[i+1], nd=next?ms?.[next.k]:null;
      const days=date&&nd?dBetw(date,nd):null, last=i===MS.length-1;
      return `<div style="display:flex;align-items:flex-start;flex:${last?'0 0 auto':1}">
        <div style="display:flex;flex-direction:column;align-items:center;min-width:76px">
          <div style="width:12px;height:12px;border-radius:50%;background:${date?'#111827':'transparent'};border:2px solid ${date?'#111827':'#D1D5DB'};margin-bottom:5px"></div>
          <div style="font-size:10px;font-weight:500;text-align:center;color:${date?'#111827':'#9CA3AF'};line-height:1.3">${m.l}</div>
          ${date?`<div style="font-size:10px;color:#6B7280;text-align:center;margin-top:2px;font-family:monospace">${fmtD(date)}</div>`:''}
        </div>
        ${!last?`<div style="flex:1;display:flex;flex-direction:column;align-items:center;padding-top:5px">
          <div style="height:2px;width:100%;background:${date&&nd?'#111827':'#E5E7EB'}"></div>
          ${days!==null?`<div style="font-size:9px;color:#9CA3AF;margin-top:2px;font-family:monospace">${days}d</div>`:''}
        </div>`:''}
      </div>`;
    }).join('')+`</div></div>`;
}

// ── SIDEBAR ───────────────────────────────────────────────
function buildSidebar() {
  const NAV=[{id:'dashboard',l:'Dashboard'},{id:'cases',l:'Cases'},{id:'drugs',l:'Drugs'},{id:'analytics',l:'Analytics'},{id:'settings',l:'Settings'}];
  const act=['dashboard','cases','drugs','analytics','settings'].includes(S.view)?S.view:S.prevView;
  const wm=S.cases.filter(c=>c.meth?.on).length;
  return `<div style="padding:0 8px 16px;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.08)">
      <div style="font-size:13px;font-weight:700;color:#fff">Market Access</div>
      <div style="font-size:11px;color:#8B9AB5;margin-top:2px">Nye Metoder tracker</div>
    </div>`+
    NAV.map(n=>`<div class="nav-item${act===n.id?' active':''}" onclick="go('${n.id}')">${n.l}</div>`).join('')+
    `<div style="margin-top:auto;padding:12px 8px 0;border-top:1px solid rgba(255,255,255,0.08);font-size:11px;color:#8B9AB5">
      <div>${S.cases.length} case${S.cases.length!==1?'s':''}</div>
      <div style="margin-top:2px">${wm} with methodology</div>
    </div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────
function buildDashboard() {
  const total=S.cases.length;
  const app=S.cases.filter(c=>isApp(c.outcome)).length;
  const rej=S.cases.filter(c=>isRej(c.outcome)).length;
  const ong=S.cases.filter(c=>c.outcome&&!isApp(c.outcome)&&!isRej(c.outcome)).length;
  const rate=(app+rej)>0?Math.round(app/(app+rej)*100):null;
  const mArr=S.cases.filter(c=>c.ms?.emaApproval&&c.ms?.decision).map(c=>mBetw(c.ms.emaApproval,c.ms.decision)).filter(x=>x>0);
  const avg=mArr.length?Math.round(mArr.reduce((a,b)=>a+b,0)/mArr.length*10)/10:null;

  const oCounts=S.cases.reduce((a,c)=>{if(c.outcome)a[c.outcome]=(a[c.outcome]||0)+1;return a;},{});
  const oLabels=Object.keys(oCounts);

  const topC=Object.entries(S.cases.reduce((a,c)=>{if(c.cancer)a[c.cancer]=(a[c.cancer]||0)+1;return a;},{})).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const recent=[...S.cases].sort((a,b)=>new Date(b.updated)-new Date(a.updated)).slice(0,6);

  setTimeout(()=>{
    mkChart('ch-outcomes','bar',{labels:oLabels.map(l=>l.replace('Approved — ','Appr: ').replace('New price negotiation initiated','Price negot.').replace('Deferred — awaiting data','Deferred')),datasets:[{data:oLabels.map(l=>oCounts[l]),backgroundColor:oLabels.map(l=>(OC[l]||{}).bg||'#E5E7EB'),borderColor:oLabels.map(l=>(OC[l]||{}).bd||'#D1D5DB'),borderWidth:1,borderRadius:4}]},{indexAxis:'y',scales:{x:{grid:{color:'#F9FAFB'}},y:{grid:{display:false}}}});
  },60);

  return `
    <div class="metrics-row">
      <div class="metric"><div class="metric-label">Total cases</div><div class="metric-value">${total}</div></div>
      <div class="metric"><div class="metric-label">Approval rate</div><div class="metric-value" style="color:#065F46">${rate!==null?rate+'%':'—'}</div><div class="metric-sub">${app} approved · ${rej} rejected</div></div>
      <div class="metric"><div class="metric-label">In process</div><div class="metric-value">${ong}</div></div>
      <div class="metric"><div class="metric-label">Avg EMA → decision</div><div class="metric-value">${avg?avg+' mo':'—'}</div><div class="metric-sub">months</div></div>
    </div>
    <div class="row" style="margin-bottom:14px">
      <div class="col card" style="flex:2 1 280px">
        <div class="section-head"><span class="section-title">Cases by outcome</span></div>
        <div class="chart-wrap" style="height:150px"><canvas id="ch-outcomes"></canvas></div>
      </div>
      <div class="col card" style="flex:1 1 160px">
        <div class="section-head"><span class="section-title">By cancer type</span></div>
        ${topC.map(([t,n])=>`<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px"><span style="color:#6B7280">${e(t)}</span><span style="font-weight:600;font-family:monospace">${n}</span></div>`).join('')}
        ${topC.length===0?'<div style="color:#9CA3AF;font-size:12px">No data yet</div>':''}
      </div>
    </div>
    <div class="card">
      <div class="section-head"><span class="section-title">Recent cases</span><button class="btn btn-secondary btn-sm" onclick="go('cases')">View all</button></div>
      <table>

// ── CASE LIST ─────────────────────────────────────────────
function buildCaseList() {
  let rows=[...S.cases];
  if(S.fQ) rows=rows.filter(c=>`${c.inn} ${c.brand} ${c.company} ${c.caseId}`.toLowerCase().includes(S.fQ.toLowerCase()));
  if(S.fCancer) rows=rows.filter(c=>c.cancer===S.fCancer);
  if(S.fOutcome) rows=rows.filter(c=>c.outcome===S.fOutcome);
  if(S.fMod) rows=rows.filter(c=>c.mod===S.fMod);
  rows.sort((a,b)=>{
    if(S.fSort==='drug') return a.inn.localeCompare(b.inn);
    if(S.fSort==='decision') return new Date(b.ms?.decision||0)-new Date(a.ms?.decision||0);
    if(S.fSort==='ema') return new Date(b.ms?.emaApproval||0)-new Date(a.ms?.emaApproval||0);
    return new Date(b.updated)-new Date(a.updated);
  });

  const selOpt=(val,opts,ph)=>`<select class="fsel" onchange="setFilter('${val}',this.value)"><option value="">${ph}</option>${opts.map(o=>`<option value="${e(o)}"${S[val]===o?' selected':''}>${e(o)}</option>`).join('')}</select>`;

  return `
    <div class="filter-row">
      <input class="inp fsel" style="flex:1 1 160px;font-size:13px" placeholder="Search drug, company, case ID…" value="${e(S.fQ)}" oninput="setFilter('fQ',this.value)">
      ${selOpt('fCancer',S.tax.cancerTypes,'All cancer types')}
      ${selOpt('fOutcome',S.tax.outcomes,'All outcomes')}
      ${selOpt('fMod',S.tax.modalities,'All modalities')}
      <select class="fsel" onchange="setFilter('fSort',this.value)">
        <option value="updated"${S.fSort==='updated'?' selected':''}>Recently updated</option>
        <option value="decision"${S.fSort==='decision'?' selected':''}>Decision date</option>
        <option value="ema"${S.fSort==='ema'?' selected':''}>EMA approval</option>
        <option value="drug"${S.fSort==='drug'?' selected':''}>Drug A–Z</option>
      </select>
    </div>
    <div style="font-size:11px;color:#9CA3AF;margin-bottom:8px">${rows.length} case${rows.length!==1?'s':''}</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead><tr class="table-head"><th>Drug</th><th>Cancer type</th><th>Line</th><th>Modality</th><th>Process</th><th>Outcome</th><th>EMA</th><th>Decision</th><th>Data</th></tr></thead>
        <tbody>${rows.map(c=>`<tr class="table-row" onclick="go('detail','${c.id}')">
          <td><div style="font-weight:500">${e(c.inn)}</div>${c.brand?`<div style="font-size:11px;color:#9CA3AF;font-style:italic">${e(c.brand)}</div>`:''}</td>
          <td style="color:#6B7280">${e(c.cancer)||'—'}</td>
          <td style="color:#6B7280">${e(c.line)||'—'}</td>
          <td style="color:#6B7280;font-size:11px">${e(c.mod)||'—'}</td>
          <td style="color:#9CA3AF;font-size:11px">${e(c.proc)||'—'}</td>
          <td>${c.outcome?badge(c.outcome,true):'<span style="color:#9CA3AF">—</span>'}</td>
          <td style="color:#9CA3AF;font-family:monospace;font-size:11px">${fmtD(c.ms?.emaApproval)}</td>
          <td style="color:#9CA3AF;font-family:monospace;font-size:11px">${fmtD(c.ms?.decision)}</td>
          <td>${c.meth?.on?'<span class="data-full">● Full</span>':'<span class="data-partial">○ Milestones</span>'}</td>
        </tr>`).join('')}</tbody>
      </table>
      ${rows.length===0?`<div class="empty">${S.cases.length===0?'No cases yet. Click &quot;+ New case&quot; to begin.':'No cases match the filters.'}</div>`:''}
    </div>`;
}

// ── ANALYTICS ─────────────────────────────────────────────
function buildAnalytics() {
  if(S.cases.length<2) return '<div class="empty" style="padding:60px 0">Add more cases to generate analytics.</div>';
  const wd=S.cases.filter(c=>c.ms?.emaApproval&&c.ms?.decision);
  const wm=S.cases.filter(c=>c.meth?.on);

  setTimeout(()=>{
    // Time chart
    const td=wd.slice(0,10);
    mkChart('ch-time','bar',{
      labels:td.map(c=>c.inn),
      datasets:[
        {label:'EMA→Decision',data:td.map(c=>mBetw(c.ms.emaApproval,c.ms.decision)),backgroundColor:'#BFDBFE',borderColor:'#1D4ED8',borderWidth:1,borderRadius:3},
        {label:'Sub→Decision',data:td.map(c=>mBetw(c.ms.nmSub,c.ms.decision)),backgroundColor:'#C4B5FD',borderColor:'#6D28D9',borderWidth:1,borderRadius:3},
      ]
    },{plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11}}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:30}},y:{grid:{color:'#F9FAFB'},title:{display:true,text:'Months',font:{size:11}}}}});

    // Cancer outcomes
    const cg=S.cases.filter(c=>c.cancer&&c.outcome).reduce((a,c)=>{if(!a[c.cancer])a[c.cancer]={app:0,rej:0,oth:0};if(isApp(c.outcome))a[c.cancer].app++;else if(isRej(c.outcome))a[c.cancer].rej++;else a[c.cancer].oth++;return a;},{});
    const ck=Object.keys(cg).sort((a,b)=>(cg[b].app+cg[b].rej+cg[b].oth)-(cg[a].app+cg[a].rej+cg[a].oth));
    mkChart('ch-cancer','bar',{
      labels:ck.map(t=>t.replace('Lung — ','')),
      datasets:[{label:'Approved',data:ck.map(t=>cg[t].app),backgroundColor:'#6EE7B7',borderRadius:3},{label:'Rejected',data:ck.map(t=>cg[t].rej),backgroundColor:'#FCA5A5',borderRadius:3},{label:'Other',data:ck.map(t=>cg[t].oth),backgroundColor:'#E5E7EB',borderRadius:3}]
    },{indexAxis:'y',plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11}}}},scales:{x:{stacked:true,grid:{color:'#F9FAFB'}},y:{stacked:true,grid:{display:false},ticks:{font:{size:10}}}}});

    // Rejection reasons
    const rc=S.cases.filter(c=>isRej(c.outcome)&&c.reasons?.length).flatMap(c=>c.reasons).filter(r=>r!=='Not applicable — approved').reduce((a,r)=>{a[r]=(a[r]||0)+1;return a;},{});
    const rk=Object.keys(rc).sort((a,b)=>rc[b]-rc[a]);
    if(rk.length) mkChart('ch-reasons','bar',{
      labels:rk.map(k=>k.replace('Cost-effectiveness threshold exceeded','Cost threshold').replace('Immature / short follow-up data','Immature data').replace('Clinical uncertainty — survival','Clinical uncertainty')),
      datasets:[{data:rk.map(k=>rc[k]),backgroundColor:'#FCA5A5',borderColor:'#B91C1C',borderWidth:1,borderRadius:3}]
    },{indexAxis:'y',scales:{x:{grid:{color:'#F9FAFB'},ticks:{stepSize:1}},y:{grid:{display:false},ticks:{font:{size:10}}}}});

    // Uncertainty
    if(wm.length){
      const ul=['Low','Moderate','High','Very high'];
      mkChart('ch-uncert','doughnut',{labels:ul,datasets:[{data:ul.map(l=>wm.filter(c=>c.meth.uLevel===l).length),backgroundColor:['#6EE7B7','#FCD34D','#FCA5A5','#EF4444'],borderWidth:0}]},{plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11}}}}});
    }

    // Surrogate
    if(wm.length){
      const sv=['Yes','No','Partial'];
      mkChart('ch-surr','bar',{labels:sv,datasets:[{data:sv.map(v=>wm.filter(c=>c.meth.surrogate===v).length),backgroundColor:'#C4B5FD',borderRadius:4}]},{scales:{x:{grid:{display:false}},y:{grid:{color:'#F9FAFB'},ticks:{stepSize:1}}}});
    }
  },60);

  return `<div class="grid2">
    <div class="card" style="grid-column:1/-1">
      <div class="section-head"><span class="section-title">Time from EMA approval to decision (months)</span></div>
      <div class="chart-wrap" style="height:200px"><canvas id="ch-time"></canvas></div>
    </div>
    <div class="card">
      <div class="section-head"><span class="section-title">Outcomes by cancer type</span></div>
      <div class="chart-wrap" style="height:200px"><canvas id="ch-cancer"></canvas></div>
    </div>
    <div class="card">
      <div class="section-head"><span class="section-title">Rejection reasons</span></div>
      ${S.cases.filter(c=>isRej(c.outcome)).length>0?`<div class="chart-wrap" style="height:200px"><canvas id="ch-reasons"></canvas></div>`:'<div style="font-size:12px;color:#9CA3AF;padding:20px 0">No rejected cases yet</div>'}
    </div>
    <div class="card">
      <div class="section-head"><span class="section-title">Uncertainty level</span></div>
      ${wm.length?`<div class="chart-wrap" style="height:200px"><canvas id="ch-uncert"></canvas></div>`:'<div style="font-size:12px;color:#9CA3AF;padding:20px 0">No methodology data yet</div>'}
    </div>
    <div class="card">
      <div class="section-head"><span class="section-title">Surrogate endpoint decisions</span></div>
      ${wm.length?`<div class="chart-wrap" style="height:200px"><canvas id="ch-surr"></canvas></div>`:'<div style="font-size:12px;color:#9CA3AF;padding:20px 0">No methodology data yet</div>'}
    </div>
  </div>`;
}

// ── DRUGS ─────────────────────────────────────────────────
function buildDrugs() {
  const q=(document.getElementById('drug-q')||{}).value||'';
  const groups=Object.values(S.cases.reduce((a,c)=>{const k=c.inn.toLowerCase();if(!a[k])a[k]={inn:c.inn,brand:c.brand,company:c.company,cases:[]};a[k].cases.push(c);return a;},{}))
    .filter(d=>!q||d.inn.toLowerCase().includes(q.toLowerCase())||d.company?.toLowerCase().includes(q.toLowerCase()))
    .sort((a,b)=>a.inn.localeCompare(b.inn));
  return `
    <div style="margin-bottom:12px"><input id="drug-q" class="inp" placeholder="Search drug or company…" style="width:260px" value="${e(q)}" oninput="rerender()"></div>
    ${groups.length===0?'<div style="color:#9CA3AF;font-size:13px">No drugs found.</div>':''}
    ${groups.map(d=>`<div class="drug-group">
      <div class="drug-head">
        <div><span class="drug-name">${e(d.inn)}</span>${d.brand?`<span style="color:#9CA3AF;margin-left:8px;font-size:13px;font-style:italic">(${e(d.brand)})</span>`:''} ${d.company?`<span style="color:#9CA3AF;margin-left:8px;font-size:12px">· ${e(d.company)}</span>`:''}  </div>
        <span class="drug-meta">${d.cases.length} indication${d.cases.length!==1?'s':''}</span>
      </div>
      <table>
        <thead><tr class="table-head"><th>Cancer type</th><th>Line</th><th>Biomarker/subgroup</th><th>Process</th><th>Outcome</th><th>Decision</th></tr></thead>
        <tbody>${d.cases.map(c=>`<tr class="table-row" onclick="go('detail','${c.id}')">
          <td>${e(c.cancer)||'—'}</td>
          <td style="color:#6B7280">${e(c.line)||'—'}</td>
          <td style="color:#6B7280">${e(c.biomarker)||'—'}</td>
          <td style="color:#9CA3AF;font-size:11px">${e(c.proc)||'—'}</td>
          <td>${badge(c.outcome,true)}</td>
          <td style="color:#9CA3AF;font-family:monospace;font-size:11px">${fmtD(c.ms?.decision)}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`).join('')}`;
}

// ── SETTINGS ──────────────────────────────────────────────
function buildSettings() {
  const lists=[{k:'cancerTypes',l:'Cancer types'},{k:'modalities',l:'Treatment modalities'},{k:'processTypes',l:'Process types'},{k:'outcomes',l:'Outcomes'},{k:'reasons',l:'Reasons for outcome'},{k:'uDrivers',l:'Uncertainty drivers'},{k:'endpoints',l:'Endpoints'},{k:'magnussen',l:'Magnussen steps'},{k:'lines',l:'Lines of treatment'}];
  return `<div style="display:flex;gap:18px">
    <div class="tax-sidebar" style="width:180px;flex-shrink:0">${lists.map(l=>`<div class="${S.taxList===l.k?'active':''}" onclick="setTaxList('${l.k}')">${l.l}</div>`).join('')}</div>
    <div class="card" style="flex:1">
      <div style="font-weight:500;margin-bottom:12px;font-size:14px">${lists.find(l=>l.k===S.taxList)?.l}</div>
      <div style="display:flex;gap:7px;margin-bottom:12px">
        <input id="new-tax-item" class="inp" placeholder="Add new item…" style="flex:1" onkeydown="if(event.key==='Enter')addTaxItem()">
        <button class="btn btn-primary btn-sm" onclick="addTaxItem()">Add</button>
      </div>
      ${(S.tax[S.taxList]||[]).map(item=>`<div class="tax-item"><span>${e(item)}</span><button class="tax-remove" onclick="removeTaxItem('${e(item).replace(/'/g,"\\'")}')" title="Remove">×</button></div>`).join('')}
    </div>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const sel=S.cases.find(c=>c.id===S.selId);
  const titles={dashboard:'Dashboard',cases:'Cases',drugs:'Drugs',analytics:'Analytics',settings:'Settings',detail:'Case detail',form:S.editing?.id?'Edit case':'New case'};
  document.getElementById('sidebar').innerHTML=buildSidebar();
  document.getElementById('main').innerHTML=`
    <div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:18px;font-weight:600">${titles[S.view]||''}</div>
      ${S.view==='cases'?'<button class="btn btn-primary" onclick="startNew()">+ New case</button>':''}
    </div>
    ${S.view==='dashboard'?buildDashboard():''}
    ${S.view==='cases'?buildCaseList():''}
    ${S.view==='drugs'?buildDrugs():''}
    ${S.view==='analytics'?buildAnalytics():''}
    ${S.view==='settings'?buildSettings():''}
    ${S.view==='detail'&&sel?buildDetail(sel):''}
    ${S.view==='detail'&&!sel?'<p style="color:#9CA3AF">Case not found.</p>':''}
    ${S.view==='form'?buildForm(S.editing):''}
  `;
}

function rerender() { render(); }

// ── ACTIONS ───────────────────────────────────────────────
function setFilter(key, val) { S[key]=val; render(); }
function setDC(v) { S.delConfirm=v; render(); }
function setTaxList(k) { S.taxList=k; render(); }
function startNew() { S.editing=null; go('form'); }
function startEdit(id) { S.editing=S.cases.find(c=>c.id===id)||null; go('form'); }
function cancelForm() { go(S.prevView); }

function toggleMethSection(on) {
  const s=document.getElementById('meth-section');
  if(s) s.style.display=on?'block':'none';
}

function toggleChip(key, val, el) {
  el.classList.toggle('on');
  if(!_chips[key]) _chips[key]=[];
  const idx=_chips[key].indexOf(val);
  if(idx>=0) _chips[key].splice(idx,1); else _chips[key].push(val);
}

function submitForm() {
  const fc=document.getElementById('form-card');
  if(!fc) return;
  const get=n=>(fc.querySelector(`[name="${n}"]`)||{}).value||'';
  const chk=n=>(fc.querySelector(`[name="${n}"]`)||{}).checked||false;
  const inn=get('inn').trim();
  if(!inn){alert('Drug INN name is required.');return;}
  const caseData={
    id:S.editing?.id||genId(),
    inn, brand:get('brand'), company:get('company'),
    cancer:get('cancer'), line:get('line'), biomarker:get('biomarker'), mod:get('mod'),
    caseId:get('caseId'), proc:get('proc'), priority:get('priority'),
    ms:{emaApproval:get('ms_emaApproval'),nmSub:get('ms_nmSub'),htaInit:get('ms_htaInit'),assessment:get('ms_assessment'),bfMeeting:get('ms_bfMeeting'),decision:get('ms_decision'),impl:get('ms_impl')},
    outcome:get('outcome'), reasons:[..._chips.reasons], rationale:get('rationale'),
    meth:{on:chk('methOn'),model:get('model'),ep:[..._chips.ep],surrogate:get('surrogate'),uLevel:get('uLevel'),uDrivers:[..._chips.uDrivers],apt:get('apt'),mag:get('mag'),qaly:get('qaly'),cpq:get('cpq'),priceNeg:chk('priceNeg')},
    notes:get('notes'), updated:today(),
  };
  if(!caseData.meth.on) caseData.meth={on:false};
  const ex=S.cases.find(c=>c.id===caseData.id);
  S.cases=ex?S.cases.map(c=>c.id===caseData.id?caseData:c):[...S.cases,caseData];
  persist(); S.selId=caseData.id; go('detail');
}

function doDelete() {
  S.cases=S.cases.filter(c=>c.id!==S.selId);
  persist(); S.selId=null; go('cases');
}

function addTaxItem() {
  const el=document.getElementById('new-tax-item');
  const val=(el?.value||'').trim();
  if(!val) return;
  if(!S.tax[S.taxList].includes(val)) S.tax[S.taxList].push(val);
  persist(); el.value=''; render();
}

function removeTaxItem(item) {
  S.tax[S.taxList]=S.tax[S.taxList].filter(i=>i!==item);
  persist(); render();
}

// ── INIT ──────────────────────────────────────────────────
restore();
render();
</script>
</body>
</html>
